# ==========================================
# 左手夾爪修改區 (Robotiq 85)
# ==========================================
leftarm/gripper_controller:
  type: position_controllers/GripperActionController
  # 修改：改成 Robotiq 85 的驅動關節名稱
  joint: leftarm_finger_joint
  action_monitor_rate: 20
  goal_tolerance: 0.05 # 放寬一點容許值
  max_effort: 100
  stall_velocity_threshold: 0.01
  stall_timeout: 0.5

### RIGHT ARM ###

rightarm/scaled_pos_joint_traj_controller:
  type: position_controllers/JointTrajectoryController
  joints:
     - rightarm_shoulder_pan_joint
     - rightarm_shoulder_lift_joint
     - rightarm_elbow_joint
     - rightarm_wrist_1_joint
     - rightarm_wrist_2_joint
     - rightarm_wrist_3_joint
  constraints:
    # Default is 0
    goal_time: 0.1
    # Default is 0.01, but is 0 for due to the movegroup/follow_joint_trajectory/goal tolerance is empty
    stopped_velocity_tolerance: 0
    rightarm_shoulder_pan_joint:
      trajectory: 0
      goal: 0.15
    rightarm_shoulder_lift_joint:
      trajectory: 0
      goal: 0.15
    rightarm_elbow_joint:
      trajectory: 0
      goal: 0.15
    rightarm_wrist_1_joint:
      trajectory: 0
      goal: 0.15
    rightarm_wrist_2_joint:
      trajectory: 0
      goal: 0.15
    rightarm_wrist_3_joint:
      trajectory: 0
      goal: 0.15

